# ghost_database.yaml — Oracle Knowledge Base
# Source: Phasmophobia wiki, patch 0.15.1.0 + corrections doc
# 27 ghosts total. Do not edit without cross-checking the official wiki.
# Corrections applied from: "Ghost Identification Corrected Against Official Wiki"

version: "0.15.1.0"
ghost_count: 27

# ─────────────────────────────────────────────────────────────────────────────
# EVIDENCE TYPES
# ─────────────────────────────────────────────────────────────────────────────

evidence_types:
  emf_5:      "EMF Level 5"
  dots:       "D.O.T.S. Projector"
  uv:         "Ultraviolet"
  freezing:   "Freezing Temperatures"
  orb:        "Ghost Orb"
  writing:    "Ghost Writing"
  spirit_box: "Spirit Box"

# ─────────────────────────────────────────────────────────────────────────────
# OBSERVATION ELIMINATORS
# A player reporting any of these observations instantly removes listed ghosts.
# The deduction engine applies these before calling the LLM.
# ─────────────────────────────────────────────────────────────────────────────

observation_eliminators:

  ghost_is_male:
    description: "Ghost has a male name or male model"
    eliminates: [Banshee, Dayan]

  ghost_turned_breaker_on:
    description: "Ghost turned the breaker on by itself"
    eliminates: [Hantu]

  ghost_turned_breaker_off_directly:
    description: "Ghost turned the breaker off directly (not via overload)"
    eliminates: [Jinn]

  ghost_turned_on_standard_light_switch:
    description: "Ghost turned on a standard wall light switch"
    eliminates: [Mare]
    note: "Mare CAN turn on TVs, computers, fuse box, and motion-sensor lights — only wall switches are the eliminator"

  ghost_moved_door_only_partially:
    description: "Ghost moved a door only partway (not fully open or fully closed)"
    eliminates: [Yurei]
    note: "Yurei can ONLY fully open or fully close doors outside of hunts"

  airball_event_observed:
    description: "An airball ghost event (smoke ball flying at player) was observed"
    eliminates: [Oni]

  ghost_clearly_visible_in_ghost_photo:
    description: "Ghost photo was taken during an event and ghost is clearly visible (no disappearance)"
    eliminates: [Phantom]

  ghost_changed_favorite_room:
    description: "Ghost visibly changed its favorite room mid-investigation"
    eliminates: [Goryo]
    note: "Banshee removed from this list — can now change rooms as of patch 0.13.0"

  dots_visible_with_naked_eye:
    description: "D.O.T.S. silhouette seen directly (without video camera)"
    eliminates: [Goryo]
    note: "Goryo's D.O.T.S. is only visible through video camera"

  ghost_stepped_in_salt:
    description: "Ghost stepped in or walked over salt and left footprints"
    eliminates: [Wraith]

  ghost_hunted_from_same_room_as_player:
    description: "Ghost initiated a hunt from the same room a player was standing in"
    eliminates: [Shade]
    note: "Shade cannot interact, ghost event, or hunt while any player is in the same room"

  ghost_produced_four_evidence_types:
    description: "Four distinct evidence types have been observed on standard difficulty"
    eliminates_all_except: [The Mimic]
    note: "Only The Mimic can produce 4 evidence types (3 real + forced Ghost Orb)"

# ─────────────────────────────────────────────────────────────────────────────
# DIFFICULTY SETTINGS
# ─────────────────────────────────────────────────────────────────────────────

difficulty:
  standard:
    evidence_count: 3
    notes: "All three evidence types available"
  nightmare:
    evidence_count: 2
    notes: "One random evidence type hidden. Guaranteed evidence is never hidden."
  insanity:
    evidence_count: 1
    notes: "Only one evidence type visible. Guaranteed evidence is shown."
  custom:
    evidence_count: "0–3"
    notes: "Player-configured"

